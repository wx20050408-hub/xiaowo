<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#FBF6EE">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小窝">
<title>小窝 ⸝⸝</title>
<style>
:root{
  --bg:#FBF6EE;
  --bg-soft:#F3EBDD;
  --card:#FFFFFF;
  --ink:#4A4036;
  --ink-soft:#9A8E80;
  --accent:#E8A87C;
  --accent-deep:#D98E5F;
  --bubble-me:#F6DCC4;
  --bubble-ta:#FFFFFF;
  --line:#EBE2D2;
  --shadow:0 6px 24px rgba(120,95,60,.10);
  --radius:22px;
  --danger:#D97B6C;
}
[data-theme="mist"]{
  --bg:#F2F2FA;
  --bg-soft:#E8E8F5;
  --card:#FFFFFF;
  --ink:#45455C;
  --ink-soft:#9595B0;
  --accent:#9B9BD8;
  --accent-deep:#8181C9;
  --bubble-me:#DEDEF5;
  --bubble-ta:#FFFFFF;
  --line:#E2E2F0;
  --shadow:0 6px 24px rgba(90,90,140,.10);
  --danger:#D97B8C;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:"PingFang SC","HarmonyOS Sans SC","MiSans","Source Han Sans SC",system-ui,sans-serif;
  background:var(--bg);color:var(--ink);
  font-size:15px;line-height:1.65;
  transition:background .3s;
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink);outline:none}
::placeholder{color:var(--ink-soft);opacity:.7}

/* ============ 整体布局 ============ */
#app{height:100%;display:flex;flex-direction:column;position:relative;max-width:760px;margin:0 auto}

/* ============ 聊天页头部 ============ */
#chatHeader{
  display:flex;align-items:center;gap:10px;
  padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.iconBtn{
  width:38px;height:38px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:19px;color:var(--ink);
  transition:background .15s;flex-shrink:0;
}
.iconBtn:active{background:var(--bg-soft)}
#headerTitle{flex:1;min-width:0;text-align:center}
#headerName{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#headerSub{font-size:11px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;gap:5px}
#headerSub::before{
  content:"";width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  animation:breath 2.4s ease-in-out infinite;
}
@keyframes breath{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1)}}
@media (prefers-reduced-motion:reduce){#headerSub::before{animation:none}}

/* ============ 消息区 ============ */
#msgArea{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:18px 14px 10px;
  display:flex;flex-direction:column;gap:14px;
}
.msg{display:flex;flex-direction:column;max-width:86%;animation:rise .25s ease both}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.msg{animation:none}}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg.ta{align-self:flex-start;align-items:flex-start}
.bubble{
  padding:11px 15px;border-radius:var(--radius);
  word-break:break-word;white-space:pre-wrap;
  box-shadow:var(--shadow);
}
.msg.me .bubble{background:var(--bubble-me);border-bottom-right-radius:8px}
.msg.ta .bubble{background:var(--bubble-ta);border-bottom-left-radius:8px}
.bubble code{background:var(--bg-soft);border-radius:6px;padding:1px 6px;font-size:13px}
.bubble.err{background:#FBEAE6;color:var(--danger);font-size:13px}
.msg .who{font-size:11px;color:var(--ink-soft);margin:0 6px 4px}
.typingDot{display:inline-block;animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}

/* 空状态 */
#empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--ink-soft);user-select:none;
}
#empty .face{font-size:34px;letter-spacing:2px}
#empty .hint{font-size:13px}

/* ============ 输入栏 ============ */
#inputBar{
  flex-shrink:0;
  padding:10px 12px calc(env(safe-area-inset-bottom) + 12px);
  background:var(--bg);
  display:flex;align-items:flex-end;gap:8px;
}
#inputWrap{
  flex:1;background:var(--card);border-radius:24px;
  box-shadow:var(--shadow);
  padding:10px 16px;display:flex;align-items:flex-end;
}
#input{
  flex:1;border:none;background:none;resize:none;
  max-height:120px;line-height:1.5;
}
#sendBtn{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:var(--accent);color:#fff;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);
  transition:transform .12s,background .15s;
}
#sendBtn:active{transform:scale(.92)}
#sendBtn.stop{background:var(--danger)}

/* ============ 侧边栏 ============ */
#scrim{
  position:fixed;inset:0;background:rgba(60,48,35,.32);
  opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;
}
#scrim.show{opacity:1;pointer-events:auto}
#drawer{
  position:fixed;top:0;left:0;bottom:0;width:min(82vw,330px);
  background:var(--bg);z-index:50;
  transform:translateX(-105%);transition:transform .28s cubic-bezier(.3,.9,.3,1);
  display:flex;flex-direction:column;
  border-radius:0 26px 26px 0;
  box-shadow:8px 0 40px rgba(100,80,55,.12);
  padding-top:calc(env(safe-area-inset-top) + 18px);
  padding-bottom:calc(env(safe-area-inset-bottom) + 14px);
}
#drawer.open{transform:none}

/* 侧边栏头部 */
#profile{display:flex;align-items:center;gap:12px;padding:4px 18px 14px}
#avatar{
  width:52px;height:52px;border-radius:50%;
  background:var(--bubble-me);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;box-shadow:var(--shadow);
}
#profileText{min-width:0}
#profileName{font-weight:600;font-size:15px}
#profileStatus{font-size:12px;color:var(--ink-soft);border:none;background:none;width:100%;padding:0}

#searchWrap{margin:0 16px 6px;position:relative}
#searchWrap::before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-50%) rotate(-45deg);color:var(--ink-soft);font-size:17px}
#search{
  width:100%;border:none;background:var(--bg-soft);
  border-radius:16px;padding:10px 14px 10px 38px;font-size:14px;
}

#newChat{
  margin:8px 16px 4px;padding:11px;border-radius:16px;
  background:var(--card);box-shadow:var(--shadow);
  font-size:14px;font-weight:600;color:var(--accent-deep);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
#newChat:active{transform:scale(.98)}

/* 历史列表 */
#historyList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 10px}
.dateLabel{font-size:12px;color:var(--accent-deep);font-weight:600;padding:12px 10px 6px;letter-spacing:1px}
.histItem{
  display:flex;align-items:center;gap:8px;
  padding:11px 12px;border-radius:16px;font-size:14px;
  transition:background .15s;
}
.histItem.active{background:var(--bg-soft)}
.histItem:active{background:var(--bg-soft)}
.histItem .t{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.histItem .del{color:var(--ink-soft);font-size:15px;padding:4px 6px;border-radius:8px;flex-shrink:0}
.histItem .del:active{color:var(--danger)}
#histEmpty{text-align:center;color:var(--ink-soft);font-size:13px;padding:30px 0}

/* 侧边栏底部 */
#drawerFoot{
  display:flex;gap:10px;padding:12px 16px 0;border-top:1px solid var(--line);
}
.footBtn{
  flex:1;padding:12px 6px;border-radius:18px;
  background:var(--card);box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:12px;color:var(--ink);
}
.footBtn:active{transform:scale(.96)}
.footBtn .ic{font-size:19px}

/* ============ 弹层通用 ============ */
.sheetScrim{
  position:fixed;inset:0;background:rgba(60,48,35,.32);z-index:60;
  display:none;align-items:flex-end;justify-content:center;
}
.sheetScrim.show{display:flex}
.sheet{
  width:100%;max-width:760px;max-height:86vh;overflow-y:auto;
  background:var(--bg);border-radius:26px 26px 0 0;
  padding:20px 20px calc(env(safe-area-inset-bottom) + 22px);
  animation:up .25s ease both;
}
@keyframes up{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.sheetTitle{font-size:17px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sheetTitle .close{font-size:20px;color:var(--ink-soft);padding:4px 8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--ink-soft);margin-bottom:6px}
.field input,.field textarea,.field select{
  width:100%;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:11px 14px;
}
.field textarea{min-height:110px;resize:vertical;line-height:1.6}
.primaryBtn{
  width:100%;padding:13px;border-radius:18px;margin-top:6px;
  background:var(--accent);color:#fff;font-size:15px;font-weight:600;
  box-shadow:var(--shadow);
}
.primaryBtn:active{background:var(--accent-deep)}
.ghostBtn{
  width:100%;padding:12px;border-radius:18px;margin-top:10px;
  background:var(--card);box-shadow:var(--shadow);font-size:14px;
}
.hintText{font-size:12px;color:var(--ink-soft);margin-top:8px;line-height:1.6}

/* 角色列表 */
.charItem{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border-radius:18px;box-shadow:var(--shadow);
  padding:13px 15px;margin-bottom:10px;
}
.charItem .em{font-size:22px}
.charItem .info{flex:1;min-width:0}
.charItem .nm{font-weight:600;font-size:14px}
.charItem .pv{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.charItem .edit{color:var(--accent-deep);font-size:13px;padding:6px}
.charItem.sel{outline:2px solid var(--accent)}

/* 百宝箱 */
.boxRow{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border-radius:18px;box-shadow:var(--shadow);
  padding:14px 16px;margin-bottom:10px;font-size:14px;
}
.boxRow .ic{font-size:19px}
.boxRow .grow{flex:1}
.themeDot{width:26px;height:26px;border-radius:50%;border:2px solid var(--line)}
.themeDot.on{border-color:var(--accent-deep);box-shadow:0 0 0 3px var(--bg-soft)}
.toast{
  position:fixed;left:50%;bottom:90px;transform:translateX(-50%);
  background:var(--ink);color:var(--bg);padding:9px 18px;border-radius:20px;
  font-size:13px;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:.92}
</style>
</head>
<body>
<div id="app">
  <!-- 顶栏 -->
  <header id="chatHeader">
    <button class="iconBtn" id="menuBtn" aria-label="菜单">☰</button>
    <div id="headerTitle">
      <div id="headerName">小窝</div>
      <div id="headerSub">在线</div>
    </div>
    <button class="iconBtn" id="gearBtn" aria-label="设置">⚙</button>
  </header>

  <!-- 消息区 -->
  <main id="msgArea">
    <div id="empty">
      <div class="face">₍ᐢ. .ᐢ₎</div>
      <div class="hint">说点什么吧，我听着呢</div>
    </div>
  </main>

  <!-- 输入栏 -->
  <footer id="inputBar">
    <div id="inputWrap">
      <textarea id="input" rows="1" placeholder="想说什么……"></textarea>
    </div>
    <button id="sendBtn" aria-label="发送">➤</button>
  </footer>
</div>

<!-- 侧边栏 -->
<div id="scrim"></div>
<aside id="drawer">
  <div id="profile">
    <div id="avatar">₍ᵔ·̫ᵔ₎</div>
    <div id="profileText">
      <div id="profileName">溪溪</div>
      <input id="profileStatus" placeholder="写点状态…">
    </div>
  </div>
  <div id="searchWrap"><input id="search" placeholder="搜索聊天"></div>
  <button id="newChat">✦ 开个新对话</button>
  <div id="historyList"></div>
  <div id="drawerFoot">
    <button class="footBtn" id="charBtn"><span class="ic">☺</span>角色</button>
    <button class="footBtn" id="boxBtn"><span class="ic">✧</span>百宝箱</button>
  </div>
</aside>

<!-- 设置弹层 -->
<div class="sheetScrim" id="settingsSheet">
  <div class="sheet">
    <div class="sheetTitle">连接设置<button class="close" data-close="settingsSheet">✕</button></div>
    <div class="field">
      <label>API Key</label>
      <input type="password" id="setKey" placeholder="sk-ant-…" autocomplete="off">
    </div>
    <div class="field">
      <label>模型</label>
      <select id="setModel">
        <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
        <option value="claude-opus-4-8">claude-opus-4-8</option>
        <option value="claude-haiku-4-5-20251001">claude-haiku-4-5</option>
        <option value="custom">自己填……</option>
      </select>
      <input id="setModelCustom" placeholder="模型名" style="display:none;margin-top:8px">
    </div>
    <div class="field">
      <label>单次回复上限（max_tokens）</label>
      <input type="number" id="setMaxTokens" value="2048" min="256" max="8192">
    </div>
    <button class="primaryBtn" id="saveSettings">保存</button>
    <div class="hintText">Key 只存在这台手机的浏览器里，不会发给除 Anthropic 之外的任何地方。</div>
  </div>
</div>

<!-- 角色弹层 -->
<div class="sheetScrim" id="charSheet">
  <div class="sheet">
    <div class="sheetTitle">角色<button class="close" data-close="charSheet">✕</button></div>
    <div id="charList"></div>
    <button class="ghostBtn" id="addChar">＋ 新角色</button>
    <div class="hintText">点选一个角色后，新开的对话会用他的设定当系统提示词。</div>
  </div>
</div>

<!-- 角色编辑弹层 -->
<div class="sheetScrim" id="charEditSheet">
  <div class="sheet">
    <div class="sheetTitle" id="charEditTitle">新角色<button class="close" data-close="charEditSheet">✕</button></div>
    <div class="field"><label>名字</label><input id="ceName" placeholder="比如：黎湛"></div>
    <div class="field"><label>头像（一个emoji或颜文字）</label><input id="ceEmoji" placeholder="❄"></div>
    <div class="field"><label>人设 / 系统提示词</label><textarea id="cePrompt" placeholder="把他的设定贴在这里…"></textarea></div>
    <button class="primaryBtn" id="saveChar">保存</button>
    <button class="ghostBtn" id="delChar" style="color:var(--danger);display:none">删除这个角色</button>
  </div>
</div>

<!-- 百宝箱弹层 -->
<div class="sheetScrim" id="boxSheet">
  <div class="sheet">
    <div class="sheetTitle">百宝箱<button class="close" data-close="boxSheet">✕</button></div>
    <div class="boxRow">
      <span class="ic">🎨</span><span class="grow">主题</span>
      <button class="themeDot" data-theme="cream" style="background:#F6DCC4"></button>
      <button class="themeDot" data-theme="mist" style="background:#DEDEF5"></button>
    </div>
    <button class="boxRow" id="exportBtn" style="width:100%"><span class="ic">📦</span><span class="grow" style="text-align:left">备份所有数据（导出 JSON）</span></button>
    <button class="boxRow" id="importBtn" style="width:100%"><span class="ic">📥</span><span class="grow" style="text-align:left">从备份恢复</span></button>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <div class="hintText">以后想到什么小玩意儿，都往这里塞。</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= 存储（带降级保护） ================= */
const mem = {};
const store = {
  get(k){ try{ return localStorage.getItem(k) ?? mem[k] ?? null }catch(e){ return mem[k] ?? null } },
  set(k,v){ mem[k]=v; try{ localStorage.setItem(k,v) }catch(e){} },
};
const load = (k,d)=>{ const v=store.get(k); if(v==null) return d; try{ return JSON.parse(v) }catch(e){ return d } };
const save = (k,v)=> store.set(k, JSON.stringify(v));

/* ================= 状态 ================= */
let settings = load('xw_settings', { apiKey:'', model:'claude-sonnet-4-6', maxTokens:2048, theme:'cream', status:'' });
let characters = load('xw_characters', [
  { id:'c1', name:'黎湛', emoji:'❄', prompt:'' }
]);
let chats = load('xw_chats', []);   // {id,title,charId,ts,messages:[{role,content}]}
let currentId = load('xw_current', null);
let selCharId = load('xw_selchar', characters[0]?.id || null);
let streaming = false, aborter = null;

const $ = id => document.getElementById(id);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = s => esc(s)
  .replace(/`([^`\n]+)`/g,'<code>$1</code>')
  .replace(/\*\*([^*\n]+)\*\*/g,'<b>$1</b>');

function toast(t){ const el=$('toast'); el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1800); }
const persistAll = ()=>{ save('xw_chats',chats); save('xw_current',currentId); save('xw_characters',characters); save('xw_selchar',selCharId); save('xw_settings',settings); };

/* ================= 主题 ================= */
function applyTheme(){
  document.documentElement.dataset.theme = settings.theme==='mist' ? 'mist' : '';
  document.querySelectorAll('.themeDot').forEach(d=>d.classList.toggle('on', d.dataset.theme===settings.theme));
}

/* ================= 侧边栏 ================= */
function openDrawer(o){ $('drawer').classList.toggle('open',o); $('scrim').classList.toggle('show',o); }
$('menuBtn').onclick = ()=>{ renderHistory(); openDrawer(true) };
$('scrim').onclick = ()=>openDrawer(false);
$('profileStatus').value = settings.status||'';
$('profileStatus').onchange = e=>{ settings.status=e.target.value; persistAll(); };
$('search').oninput = ()=>renderHistory();

function dateLabel(ts){
  const d=new Date(ts), now=new Date();
  const day=x=>new Date(x.getFullYear(),x.getMonth(),x.getDate()).getTime();
  const diff=(day(now)-day(d))/86400000;
  if(diff===0) return '今天';
  if(diff===1) return '昨天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}
function renderHistory(){
  const list=$('historyList'); list.innerHTML='';
  const q=$('search').value.trim();
  const items=chats.filter(c=>!q||c.title.includes(q)).sort((a,b)=>b.ts-a.ts);
  if(!items.length){ list.innerHTML='<div id="histEmpty">还没有聊天记录</div>'; return; }
  let lastLabel='';
  items.forEach(c=>{
    const lb=dateLabel(c.ts);
    if(lb!==lastLabel){ lastLabel=lb; const dl=document.createElement('div'); dl.className='dateLabel'; dl.textContent=lb; list.appendChild(dl); }
    const it=document.createElement('div');
    it.className='histItem'+(c.id===currentId?' active':'');
    it.innerHTML=`<span class="t">${esc(c.title)}</span><button class="del">✕</button>`;
    it.querySelector('.t').onclick=()=>{ switchChat(c.id); openDrawer(false); };
    it.querySelector('.del').onclick=ev=>{
      ev.stopPropagation();
      if(!confirm(`删掉「${c.title}」？`)) return;
      chats=chats.filter(x=>x.id!==c.id);
      if(currentId===c.id){ currentId=null; renderChat(); }
      persistAll(); renderHistory();
    };
    list.appendChild(it);
  });
}
$('newChat').onclick=()=>{ currentId=null; renderChat(); openDrawer(false); persistAll(); };

/* ================= 聊天 ================= */
function curChat(){ return chats.find(c=>c.id===currentId); }
function curChar(of){ const id = of?.charId ?? selCharId; return characters.find(c=>c.id===id) || characters[0]; }

function renderHeader(){
  const c=curChat();
  const ch=curChar(c);
  $('headerName').textContent = c ? c.title : (ch ? ch.name : '小窝');
  $('headerSub').textContent = ch ? `${ch.name} · 在线` : '在线';
}
function switchChat(id){ currentId=id; persistAll(); renderChat(); }

function bubbleEl(role,html,extra){
  const m=document.createElement('div');
  m.className='msg '+(role==='user'?'me':'ta');
  const ch=curChar(curChat());
  const who=role==='user'?'':(ch?ch.name:'');
  m.innerHTML=(who?`<div class="who">${esc(who)}</div>`:'')+`<div class="bubble ${extra||''}">${html}</div>`;
  return m;
}
function renderChat(){
  const area=$('msgArea'); area.innerHTML='';
  renderHeader();
  const c=curChat();
  if(!c||!c.messages.length){
    area.innerHTML='<div id="empty"><div class="face">₍ᐢ. .ᐢ₎</div><div class="hint">说点什么吧，我听着呢</div></div>';
    return;
  }
  c.messages.forEach(m=>area.appendChild(bubbleEl(m.role,fmt(m.content))));
  area.scrollTop=area.scrollHeight;
}

/* 输入框自适应高度 */
const input=$('input');
input.oninput=()=>{ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,120)+'px'; };

/* ================= 发送 & 流式 ================= */
$('sendBtn').onclick=()=>{ streaming ? stopStream() : send(); };
function stopStream(){ if(aborter) aborter.abort(); }

async function send(){
  const text=input.value.trim();
  if(!text) return;
  if(!settings.apiKey){ toast('先去 ⚙ 里填 API Key 哦'); openSheet('settingsSheet'); return; }

  let c=curChat();
  if(!c){
    c={ id:'t'+Date.now(), title:text.slice(0,16)||'新对话', charId:selCharId, ts:Date.now(), messages:[] };
    chats.push(c); currentId=c.id;
  }
  c.messages.push({role:'user',content:text});
  c.ts=Date.now();
  input.value=''; input.style.height='auto';
  persistAll(); renderChat();

  const area=$('msgArea');
  const holder=bubbleEl('assistant','<span class="typingDot">…</span>');
  area.appendChild(holder); area.scrollTop=area.scrollHeight;
  const bub=holder.querySelector('.bubble');

  streaming=true; $('sendBtn').textContent='■'; $('sendBtn').classList.add('stop');
  aborter=new AbortController();
  let acc='';
  try{
    const ch=curChar(c);
    const body={
      model: settings.model,
      max_tokens: Number(settings.maxTokens)||2048,
      stream: true,
      messages: c.messages.map(m=>({role:m.role,content:m.content})),
    };
    if(ch && ch.prompt.trim()) body.system=ch.prompt;

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal:aborter.signal,
      headers:{
        'content-type':'application/json',
        'x-api-key':settings.apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body:JSON.stringify(body),
    });
    if(!res.ok){
      const errText=await res.text();
      throw new Error(`HTTP ${res.status}：${errText.slice(0,300)}`);
    }
    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let buf='';
    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data:')) continue;
        const payload=line.slice(5).trim();
        if(!payload||payload==='[DONE]') continue;
        try{
          const ev=JSON.parse(payload);
          if(ev.type==='content_block_delta'&&ev.delta&&ev.delta.text){
            acc+=ev.delta.text;
            bub.innerHTML=fmt(acc);
            area.scrollTop=area.scrollHeight;
          }
          if(ev.type==='error') throw new Error(ev.error?.message||'流式出错');
        }catch(e){ if(e instanceof SyntaxError) continue; throw e; }
      }
    }
    if(acc){ c.messages.push({role:'assistant',content:acc}); c.ts=Date.now(); persistAll(); }
    else bub.innerHTML='<i>（空回复）</i>';
  }catch(e){
    if(e.name==='AbortError'){
      if(acc){ c.messages.push({role:'assistant',content:acc}); persistAll(); }
      else holder.remove();
    }else{
      bub.classList.add('err');
      bub.textContent='出错了：'+e.message;
    }
  }finally{
    streaming=false; aborter=null;
    $('sendBtn').textContent='➤'; $('sendBtn').classList.remove('stop');
    renderHeader(); renderHistory();
  }
}

/* ================= 弹层通用 ================= */
function openSheet(id){ $(id).classList.add('show'); }
function closeSheet(id){ $(id).classList.remove('show'); }
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>closeSheet(b.dataset.close));
document.querySelectorAll('.sheetScrim').forEach(s=>s.addEventListener('click',e=>{ if(e.target===s) s.classList.remove('show'); }));

/* ================= 设置 ================= */
$('gearBtn').onclick=()=>{
  $('setKey').value=settings.apiKey;
  const sel=$('setModel');
  const known=[...sel.options].some(o=>o.value===settings.model);
  sel.value=known?settings.model:'custom';
  $('setModelCustom').style.display=known?'none':'block';
  $('setModelCustom').value=known?'':settings.model;
  $('setMaxTokens').value=settings.maxTokens;
  openSheet('settingsSheet');
};
$('setModel').onchange=e=>{ $('setModelCustom').style.display=e.target.value==='custom'?'block':'none'; };
$('saveSettings').onclick=()=>{
  settings.apiKey=$('setKey').value.trim();
  settings.model=$('setModel').value==='custom'?$('setModelCustom').value.trim():$('setModel').value;
  settings.maxTokens=Number($('setMaxTokens').value)||2048;
  persistAll(); closeSheet('settingsSheet'); toast('存好啦');
};

/* ================= 角色 ================= */
let editingChar=null;
$('charBtn').onclick=()=>{ renderChars(); openSheet('charSheet'); };
function renderChars(){
  const list=$('charList'); list.innerHTML='';
  characters.forEach(ch=>{
    const it=document.createElement('div');
    it.className='charItem'+(ch.id===selCharId?' sel':'');
    it.innerHTML=`<span class="em">${esc(ch.emoji||'☺')}</span>
      <div class="info"><div class="nm">${esc(ch.name)}</div><div class="pv">${esc(ch.prompt||'还没写设定')}</div></div>
      <button class="edit">编辑</button>`;
    it.querySelector('.info').onclick=()=>{ selCharId=ch.id; persistAll(); renderChars(); renderHeader(); toast(`新对话会用「${ch.name}」`); };
    it.querySelector('.edit').onclick=ev=>{ ev.stopPropagation(); openCharEdit(ch); };
    list.appendChild(it);
  });
}
$('addChar').onclick=()=>openCharEdit(null);
function openCharEdit(ch){
  editingChar=ch;
  $('charEditTitle').childNodes[0].textContent=ch?'编辑角色':'新角色';
  $('ceName').value=ch?ch.name:'';
  $('ceEmoji').value=ch?ch.emoji:'';
  $('cePrompt').value=ch?ch.prompt:'';
  $('delChar').style.display=ch&&characters.length>1?'block':'none';
  openSheet('charEditSheet');
}
$('saveChar').onclick=()=>{
  const name=$('ceName').value.trim();
  if(!name){ toast('名字不能空着'); return; }
  if(editingChar){
    editingChar.name=name; editingChar.emoji=$('ceEmoji').value.trim(); editingChar.prompt=$('cePrompt').value;
  }else{
    const nc={id:'c'+Date.now(),name,emoji:$('ceEmoji').value.trim(),prompt:$('cePrompt').value};
    characters.push(nc); selCharId=nc.id;
  }
  persistAll(); closeSheet('charEditSheet'); renderChars(); renderHeader(); toast('存好啦');
};
$('delChar').onclick=()=>{
  if(!editingChar||!confirm(`删掉「${editingChar.name}」？`)) return;
  characters=characters.filter(c=>c.id!==editingChar.id);
  if(selCharId===editingChar.id) selCharId=characters[0]?.id||null;
  persistAll(); closeSheet('charEditSheet'); renderChars();
};

/* ================= 百宝箱 ================= */
$('boxBtn').onclick=()=>{ applyTheme(); openSheet('boxSheet'); };
document.querySelectorAll('.themeDot').forEach(d=>d.onclick=()=>{ settings.theme=d.dataset.theme; persistAll(); applyTheme(); });
$('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({settings:{...settings,apiKey:''},characters,chats},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const d=new Date();
  a.download=`小窝备份-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('备份不含 API Key，放心传');
};
$('importBtn').onclick=()=>$('importFile').click();
$('importFile').onchange=async e=>{
  const f=e.target.files[0]; if(!f) return;
  try{
    const data=JSON.parse(await f.text());
    if(data.characters) characters=data.characters;
    if(data.chats) chats=data.chats;
    if(data.settings){ const k=settings.apiKey; settings={...settings,...data.settings}; if(!settings.apiKey) settings.apiKey=k; }
    persistAll(); applyTheme(); renderChat(); renderHistory(); renderChars();
    toast('恢复好啦');
  }catch(err){ toast('这个文件读不了'); }
  e.target.value='';
};

/* ================= 启动 ================= */
applyTheme();
renderChat();
renderHistory();
</script>
</body>
</html>
